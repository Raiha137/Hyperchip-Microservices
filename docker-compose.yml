services:

  # Config Server
  config-server:
    build: ./HyperchipConfigServer
    image: ecommerceprojects-config-server:latest
    container_name: config-server
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Eureka Discovery
  discovery:
    build: ./HyperchipDiscovery
    image: ecommerceprojects-discovery:latest
    container_name: discovery
    ports:
      - "8761:8761"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - config-server
    networks:
      - ecommerce-network
    restart: unless-stopped

  # API Gateway (entry point)
  api-gateway:
    build: ./HyperchipApiGateway
    image: ecommerceprojects-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
    depends_on:
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Auth DB
  auth-mysql:
    image: mysql:8
    container_name: auth-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - auth-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build: ./HyperchipAuthService
    image: ecommerceprojects-auth-service:latest
    container_name: auth-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-mysql:3306/${AUTH_DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      USER_SERVICE_SSO_FINISH: ${USER_SERVICE_SSO_FINISH}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
    depends_on:
      - auth-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # User DB
  user-mysql:
    image: mysql:8
    container_name: user-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${USER_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - user-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build: ./HyperchipUser
    image: ecommerceprojects-user-service:latest
    container_name: user-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://user-mysql:3306/${USER_DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      MASTER_SERVICE_URL: http://hyperchip-master:8086
    depends_on:
      - user-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Admin DB
  admin-mysql:
    image: mysql:8
    container_name: admin-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${ADMIN_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${ADMIN_DB_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - admin-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Admin Service
  admin-service:
    build: ./HyperchipAdmin
    image: ecommerceprojects-admin-service:latest
    container_name: admin-service
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://admin-mysql:3306/${ADMIN_DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${ADMIN_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ADMIN_DB_PASSWORD}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      MASTER_SERVICE_URL: http://hyperchip-master:8086
      AUTH_SERVICE_URL: http://auth-service:8084
      API_BASE_URL: http://hyperchip-master:8086/api/admin
    depends_on:
      - admin-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Master DB
  master-mysql:
    image: mysql:8
    container_name: master-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MASTER_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MASTER_DB_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - master-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Master Service
  master-service:
    build: ./HyperchipMaster
    image: ecommerceprojects-master-service:latest
    container_name: master-service
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://master-mysql:3306/${MASTER_DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MASTER_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${MASTER_DB_PASSWORD}
    depends_on:
      - master-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Cart DB & Service
  cart-mysql:
    image: mysql:8
    container_name: cart-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hyperchip_cart_db
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "3311:3306"
    volumes:
      - cart-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  cart-service:
    build: ./HyperchipCart
    image: ecommerceprojects-cart-service:latest
    container_name: cart-service
    ports:
      - "8091:8091"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://cart-mysql:3306/hyperchip_cart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
    depends_on:
      - cart-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Wishlist DB & Service
  wishlist-mysql:
    image: mysql:8
    container_name: wishlist-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hyperchip_wishlist_db
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "3312:3306"
    volumes:
      - wishlist-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  wishlist-service:
    build: ./HyperchipWishlist
    image: ecommerceprojects-wishlist-service:latest
    container_name: wishlist-service
    ports:
      - "8093:8093"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://wishlist-mysql:3306/hyperchip_wishlist_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
    depends_on:
      - wishlist-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Wallet DB & Service
  wallet-mysql:
    image: mysql:8
    container_name: wallet-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hyperchip_wallet_db
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "3313:3306"
    volumes:
      - wallet-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-service:
    build: ./HyperchipWallet
    image: ecommerceprojects-wallet-service:latest
    container_name: wallet-service
    ports:
      - "8095:8095"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://wallet-mysql:3306/hyperchip_wallet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
    depends_on:
      - wallet-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Payment DB & Service
  payment-mysql:
    image: mysql:8
    container_name: payment-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hyperchip_payment_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3315:3306"
    volumes:
      - payment-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./HyperchipPayment
    image: ecommerceprojects-payment-service:latest
    container_name: payment-service
    ports:
      - "8094:8094"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-mysql:3306/hyperchip_payment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RAZORPAY_KEY: ${RAZORPAY_KEY}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET}
    depends_on:
      - payment-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Order DB & Service
  order-mysql:
    image: mysql:8
    container_name: order-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hyperchip_order_db
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "3314:3306"
    volumes:
      - order-db:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./HyperchipOrder
    image: ecommerceprojects-order-service:latest
    container_name: order-service
    ports:
      - "8092:8092"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
    depends_on:
      - order-mysql
      - config-server
      - discovery
    networks:
      - ecommerce-network
    restart: unless-stopped

# Volumes
volumes:
  auth-db:
  user-db:
  admin-db:
  master-db:
  cart-db:
  wishlist-db:
  wallet-db:
  order-db:
  payment-db:

# Network
networks:
  ecommerce-network:
    driver: bridge