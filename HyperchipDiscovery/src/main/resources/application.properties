# ============================================
# CONFIG SERVER - PURPOSE
# --------------------------------------------
# This service acts as the central configuration source
# for all Hyperchip microservices. Instead of keeping
# configuration files inside each service, every microservice
# fetches its properties from this Config Server.
#
# Benefits:
#  - Centralized configuration management
#  - Easy updates without redeploying services
#  - Environment-specific configurations (dev, test, prod)
#  - Version-controlled configuration stored in Git
# ============================================

# =========================
# Application
# =========================
spring.application.name=discovery
server.port=8761

# =========================
# Config Server (MODERN WAY)
# =========================
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.enabled=true
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=10

# =========================
# Eureka Server Config
# =========================
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always