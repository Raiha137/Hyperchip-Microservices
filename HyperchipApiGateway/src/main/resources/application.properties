#Ecommerce Projects/HyperchipApiGateway/src/resources/application.properties

# =========================
# Application Name
# =========================
spring.application.name=hyperchip-api-gateway

# =========================
# Config Server (SAFE WAY)
# =========================
spring.config.import=configserver:http://config-server:8888
spring.cloud.config.fail-fast=true

# Retry (IMPORTANT)
spring.cloud.config.retry.enabled=true
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=10

# =========================
# Eureka
# =========================
eureka.client.serviceUrl.defaultZone=http://discovery:8761/eureka

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,info,gateway,refresh
management.endpoint.gateway.enabled=true













