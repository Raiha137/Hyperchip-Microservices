<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const periodSelect = document.getElementById('period-select');
        let salesChart = null;

        function fmtMoney(v) {
            return Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderTable(tbodyId, rows, nameKey) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No data</td></tr>';
                return;
            }
            rows.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td>${i + 1}</td>
                <td>${r[nameKey] ?? '-'}</td>
                <td>${r.totalQuantity ?? 0}</td>
                <td>${fmtMoney(r.totalAmount)}</td>
            `;
                tbody.appendChild(tr);
            });
        }

        function renderChart(chartPoints) {
            const ctx = document.getElementById('sales-chart').getContext('2d');
            const labels = (chartPoints || []).map(p => p.label);
            const data = (chartPoints || []).map(p => p.totalAmount);

            if (salesChart) salesChart.destroy();
            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Sales Amount',
                        data: data,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13,110,253,0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        function loadDashboard(periodType) {
            fetch(`/admin/api/dashboard?periodType=${encodeURIComponent(periodType)}`)
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load dashboard: ' + res.status);
                    return res.json();
                })
                .then(data => {
                    renderChart(data.chartPoints);
                    renderTable('top-products-body', data.topProducts, 'productName');
                    renderTable('top-categories-body', data.topCategories, 'categoryName');
                    renderTable('top-brands-body', data.topBrands, 'brandName');
                })
                .catch(err => console.error(err));
        }

        periodSelect.addEventListener('change', function () {
            loadDashboard(this.value);
        });

        loadDashboard(periodSelect.value); // initial load, MONTH by default
    });
</script>
